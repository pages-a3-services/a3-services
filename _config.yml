# _config.yml

# Základné nastavenia
title: A₃ services
favicon: "/_media/a3-128.png"
logo: "/_media/a3-128.png"
footer: "<a href='https://a3.services'>A₃</a> • © 2026 by <a href='https://chlapcizbystrice.sk' target='_blank'>chzb</a>"
footer_repo: "https://github.com/pages-a3-services/a3-services"

# Remote theme
remote_theme: pages-a3-services/ars-j3kyll
plugins:
  - jekyll-remote-theme

# Téma – vlastná premenná pre dark mode
theme_skin: dark

# Predvolené layouty pre všetky stránky
defaults:
  - scope:
      path: ""       # platí pre všetky súbory
      type: "pages"  # alebo "posts", ak máš blog
    values:
      layout: base   # alebo "default", podľa toho, ako sa volá tvoj layout v remote theme

# Súbory, ktoré majú byť zahrnuté do buildu
include:
  - _media